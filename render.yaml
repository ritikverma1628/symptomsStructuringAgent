services:
  - type: web
    name: ai-symptom-backend
    env: node
    plan: free
    rootDir: cognoizant hackathon/backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: NODE_VERSION
        value: "20"

  - type: web
    name: ai-symptom-frontend
    env: static
    plan: free
    rootDir: cognoizant hackathon/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_URL
        fromService:
          type: web
          name: ai-symptom-backend
          envVarKey: RENDER_EXTERNAL_URL
