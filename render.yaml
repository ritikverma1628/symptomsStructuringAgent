services:
  - type: web
    name: ai-symptom-backend
    env: node
    plan: free
    buildCommand: cd "cognoizant hackathon/backend" && npm install
    startCommand: cd "cognoizant hackathon/backend" && node server.js
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: NODE_VERSION
        value: "20"

  - type: web
    name: ai-symptom-frontend
    env: static
    plan: free
    buildCommand: cd "cognoizant hackathon/frontend" && npm install && npm run build
    staticPublishPath: "cognoizant hackathon/frontend/dist"
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_URL
        fromService:
          type: web
          name: ai-symptom-backend
          envVarKey: RENDER_EXTERNAL_URL
